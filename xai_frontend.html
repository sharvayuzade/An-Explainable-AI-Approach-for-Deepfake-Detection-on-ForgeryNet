<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgery Detection Frontend</title>
  <style>
    :root {
      --bg1: #f5f7fa;
      --bg2: #e4ecf7;
      --card: #ffffff;
      --text: #1b2838;
      --muted: #5f6f83;
      --accent: #1d6fdc;
      --border: #d6e0ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(1100px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(16, 40, 79, 0.1);
      padding: 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(20px, 3vw, 30px);
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
    }
    .note {
      background: #eef4ff;
      border: 1px solid #cfe0ff;
      color: #1e3c72;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    iframe {
      width: 100%;
      height: 75vh;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }
    .btn {
      margin-top: 10px;
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>CASIA Forgery Detection</h1>
    <p>Simple frontend page for upload and explainable AI output.</p>
    <div class="note">
      Start the notebook last cell first (Gradio launch), then use this page.
      It loads the local app from http://127.0.0.1:7860
    </div>
    <iframe src="http://127.0.0.1:7860" title="Gradio UI"></iframe>
    <a class="btn" href="http://127.0.0.1:7860" target="_blank" rel="noopener noreferrer">Open App in New Tab</a>
  </main>
</body>
</html>
